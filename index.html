<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HumidorHQ flat-file cigar collection manager">
    <title>HumidorHQ</title>
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg?v=1.1.1">
    <link rel="apple-touch-icon" sizes="180x180" href="public/apple-touch-icon.png?v=1.0.0">
    <link rel="stylesheet" href="public/assets/css/app.css?v=1.8.3">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-row">
            <h1>HumidorHQ</h1>

        </div>
        <div class="mobile-primary-nav" aria-label="Mobile primary pages">

      <main class="main-content">
        <section class="hero-panel" aria-labelledby="page-title">

    <script src="public/assets/js/app.js?v=1.24.13" defer></script>
